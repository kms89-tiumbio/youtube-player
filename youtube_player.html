<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Signage Player</title>
<meta name="referrer" content="strict-origin-when-cross-origin">
<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}
#player {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
}
</style>
</head>
<body>

<div id="player"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const VIDEO_ID = "GT1Goh_wSxA";
const PAGE_ORIGIN = "https://kms89-tiumbio.github.io";

/*
  설정값
*/
const PERIODIC_RELOAD_MS = 30 * 60 * 1000;   // 30분마다 강제 재로드
const STUCK_CHECK_MS = 15 * 1000;            // 15초 이상 멈춘 상태면 재로드
const ERROR_RETRY_MS = 5 * 1000;             // 오류 시 5초 후 재시도

let player = null;
let lastStateChangeTime = Date.now();
let reloadLock = false;

function log(msg) {
    console.log("[YouTube Player] " + msg);
}

function safeReloadVideo(reason) {
    if (!player || reloadLock) {
        return;
    }

    reloadLock = true;
    log("Reload video: " + reason);

    try {
        player.loadVideoById(VIDEO_ID);
    } catch (e) {
        log("Reload failed: " + e.message);
    }

    setTimeout(function () {
        reloadLock = false;
    }, 3000);
}

function onYouTubeIframeAPIReady() {
    player = new YT.Player("player", {
        videoId: VIDEO_ID,
        playerVars: {
            autoplay: 1,
            controls: 0,
            rel: 0,
            modestbranding: 1,
            playsinline: 1,
            origin: PAGE_ORIGIN
        },
        events: {
            onReady: onPlayerReady,
            onStateChange: onPlayerStateChange,
            onError: onPlayerError
        }
    });
}

function onPlayerReady(event) {
    log("Player ready");
    event.target.mute();
    event.target.playVideo();
    lastStateChangeTime = Date.now();
}

function onPlayerStateChange(event) {
    lastStateChangeTime = Date.now();

    switch (event.data) {
        case YT.PlayerState.UNSTARTED:
            log("State: UNSTARTED");
            break;
        case YT.PlayerState.ENDED:
            log("State: ENDED");
            safeReloadVideo("video ended");
            break;
        case YT.PlayerState.PLAYING:
            log("State: PLAYING");
            break;
        case YT.PlayerState.PAUSED:
            log("State: PAUSED");
            break;
        case YT.PlayerState.BUFFERING:
            log("State: BUFFERING");
            break;
        case YT.PlayerState.CUED:
            log("State: CUED");
            break;
        default:
            log("State: UNKNOWN (" + event.data + ")");
            break;
    }
}

function onPlayerError(event) {
    log("YouTube error code: " + event.data);
    setTimeout(function () {
        safeReloadVideo("player error " + event.data);
    }, ERROR_RETRY_MS);
}

/*
  30분마다 강제 재로드
*/
setInterval(function () {
    safeReloadVideo("periodic reload");
}, PERIODIC_RELOAD_MS);

/*
  버퍼링/정지/시작실패 상태가 너무 오래가면 재로드
*/
setInterval(function () {
    if (!player) {
        return;
    }

    let currentState = -999;

    try {
        currentState = player.getPlayerState();
    } catch (e) {
        log("Failed to get player state: " + e.message);
        return;
    }

    const elapsed = Date.now() - lastStateChangeTime;

    if (
        (currentState === YT.PlayerState.UNSTARTED ||
         currentState === YT.PlayerState.BUFFERING ||
         currentState === YT.PlayerState.PAUSED ||
         currentState === YT.PlayerState.CUED) &&
        elapsed > STUCK_CHECK_MS
    ) {
        safeReloadVideo("stuck state for " + elapsed + "ms");
    }
}, 5000);
</script>

</body>
</html>
