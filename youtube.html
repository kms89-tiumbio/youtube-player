<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MagicInfo YouTube Player</title>
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #player {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    iframe {
      width: 100% !important;
      height: 100% !important;
      border: 0 !important;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="player"></div>

  <script>
    const VIDEO_ID = "qDTMeR4n2b8";   // 원하는 영상 ID로 변경
    const ORIGIN_URL = "https://kms89-tiumbio.github.io";

    let player = null;

    function safe(fn) {
      try {
        fn();
      } catch (e) {
        console.error(e);
      }
    }

    function playMuted() {
      if (!player) return;
      safe(() => player.mute());
      safe(() => player.playVideo());
    }

    function onYouTubeIframeAPIReady() {
      player = new YT.Player("player", {
        width: "100%",
        height: "100%",
        videoId: VIDEO_ID,
        playerVars: {
          autoplay: 1,
          mute: 1,
          controls: 0,
          disablekb: 1,
          fs: 0,
          modestbranding: 1,
          playsinline: 1,
          rel: 0,
          iv_load_policy: 3,
          cc_load_policy: 0,
          loop: 1,
          playlist: VIDEO_ID,
          enablejsapi: 1,
          origin: ORIGIN_URL
        },
        events: {
          onReady: function (event) {
            safe(() => event.target.mute());
            safe(() => event.target.playVideo());

            // 일부 환경에서 최초 1회 재호출이 더 안정적
            setTimeout(() => {
              safe(() => event.target.mute());
              safe(() => event.target.playVideo());
            }, 1500);
          },

          onStateChange: function (event) {
            // 영상이 실제 종료되면 다시 재생
            if (event.data === YT.PlayerState.ENDED) {
              setTimeout(() => {
                playMuted();
              }, 1000);
            }
          },

          onError: function (event) {
            console.error("YouTube Player Error:", event.data);
            // 에러가 나도 플레이어 재생성/리로드는 하지 않음
          },

          onAutoplayBlocked: function () {
            // 자동재생 차단 시 음소거 상태로 한 번만 재시도
            setTimeout(() => {
              playMuted();
            }, 1000);
          }
        }
      });
    }

    // 포커스 복귀 시 한 번만 재생 시도
    window.addEventListener("focus", () => {
      setTimeout(() => {
        playMuted();
      }, 500);
    });

    // 화면이 다시 활성화되면 한 번만 재생 시도
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) {
        setTimeout(() => {
          playMuted();
        }, 500);
      }
    });

    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    tag.async = true;
    document.head.appendChild(tag);
  </script>
</body>
</html>
